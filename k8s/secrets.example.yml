# =============================================================================
# PLANTILLA DE SECRETOS — NO contiene secretos reales. NO apliques este archivo
# tal cual en producción con estos valores.
#
# Uso:
#   1) cp k8s/secrets.example.yml k8s/secrets.yml   (secrets.yml está en .gitignore)
#   2) Rellena los valores CHANGE_ME_*
#   3) kubectl apply -f k8s/secrets.yml
#
# Alternativa (no commitear nada): usa `kubectl create secret generic ...`
# o sealed-secrets / external-secrets para GitOps.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: odoo-db-credentials
type: Opaque
stringData:
  # Compartido por Postgres (POSTGRES_PASSWORD) y Odoo (PASSWORD/db_password)
  # para evitar drift. ⚠️ Postgres fija la contraseña en el primer initdb:
  # define este secreto ANTES del primer arranque o resetea el PVC.
  username: odoo
  password: CHANGE_ME_db_password
---
apiVersion: v1
kind: Secret
metadata:
  name: odoo-config-secret
type: Opaque
stringData:
  # odoo.conf completo montado en /etc/odoo/odoo.conf. Mantiene admin_passwd
  # fuera de cualquier ConfigMap en texto plano. db_password NO se pone aquí:
  # Odoo lo toma de la env PASSWORD (secret odoo-db-credentials) para no duplicar.
  odoo.conf: |
    [options]
    admin_passwd = CHANGE_ME_master_password
    db_host = postgres-service
    db_port = 5432
    db_user = odoo
    db_maxconn = 32
    addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
    proxy_mode = True
    list_db = False
    workers = 2
    max_cron_threads = 1
    limit_time_cpu = 600
    limit_time_real = 1200
    limit_memory_hard = 1342177280
    limit_memory_soft = 805306368
---
apiVersion: v1
kind: Secret
metadata:
  name: vllm-secret
type: Opaque
stringData:
  # Token de HuggingFace (opcional, evita rate-limits al descargar pesos).
  hf-token: CHANGE_ME_hf_token
---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-secret
type: Opaque
stringData:
  # API key de un usuario Odoo de bajo privilegio (NO admin) — ver Fase 7.
  odoo-api-key: CHANGE_ME_scoped_odoo_api_key
  odoo-db: odoo
  odoo-user: ai_integration
